server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Audio uploads — nginx default (1m) would reject typical recordings.
    client_max_body_size 50m;

    # API: reverse-proxy to the backend container on the compose network.
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Transcription + Claude eval can take tens of seconds; default 60s is too short.
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # SPA fallback — client-side routing serves index.html for unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

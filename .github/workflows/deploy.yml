name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  # Runs on GitHub-hosted runners — no access to the school box needed.
  ci:
    name: Build & check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Lightweight backend sanity check — full deps (torch-free but heavy) are
      # installed only in the Docker image, so here we just byte-compile the source.
      - name: Compile backend
        run: python -m compileall backend/app

  # Runs on the self-hosted runner on the school box (campus-only / firewalled).
  deploy:
    name: Deploy to school server
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: [self-hosted, talkquest]
    steps:
      # Operate on the canonical deploy dir (holds the persistent, git-ignored .env).
      # No actions/checkout — we pull into ~/dev/TalkQuest to keep .env in place.
      - name: Pull & redeploy
        run: |
          cd ~/dev/TalkQuest
          git fetch origin
          git reset --hard origin/main
          docker compose up -d --build
          docker image prune -f
